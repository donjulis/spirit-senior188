        /* ============================================
           🌌 BACKGROUND BIRU ELEGAN — MULTI LAYER
        ============================================ */
        body {
            font-family: 'Noto Sans', 'Tahoma', sans-serif;
            font-weight: bold;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            position: relative;
            overflow: hidden;

            /* Base gradient biru tua elegan */
            background-color: #020818;
            background-image:
                /* Aurora atas — biru terang */
                radial-gradient(ellipse 80% 40% at 50% -10%,
                    rgba(30, 100, 255, 0.45) 0%,
                    transparent 70%),
                /* Aurora tengah — cyan lembut */
                radial-gradient(ellipse 60% 50% at 80% 40%,
                    rgba(0, 200, 255, 0.18) 0%,
                    transparent 65%),
                /* Aurora kiri bawah — indigo */
                radial-gradient(ellipse 50% 40% at 10% 80%,
                    rgba(80, 30, 200, 0.25) 0%,
                    transparent 65%),
                /* Deep base — navy ke hitam */
                linear-gradient(160deg,
                    #020c2e 0%,
                    #040f3a 25%,
                    #010a20 55%,
                    #020612 100%);
        }

        /* ============================================
           ✨ BINTANG — Pseudo layer via CSS
        ============================================ */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(1px 1px at 10% 15%, rgba(255,255,255,0.85) 0%, transparent 100%),
                radial-gradient(1px 1px at 22% 35%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 35% 8%, rgba(255,255,255,0.9) 0%, transparent 100%),
                radial-gradient(1px 1px at 45% 55%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1px 1px at 55% 20%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 62% 70%, rgba(255,255,255,0.75) 0%, transparent 100%),
                radial-gradient(1px 1px at 70% 10%, rgba(255,255,255,0.9) 0%, transparent 100%),
                radial-gradient(1px 1px at 78% 42%, rgba(255,255,255,0.65) 0%, transparent 100%),
                radial-gradient(2px 2px at 85% 25%, rgba(180,220,255,0.95) 0%, transparent 100%),
                radial-gradient(1px 1px at 90% 80%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(1px 1px at 15% 65%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 28% 80%, rgba(200,230,255,0.85) 0%, transparent 100%),
                radial-gradient(1px 1px at 40% 90%, rgba(255,255,255,0.5) 0%, transparent 100%),
                radial-gradient(1px 1px at 50% 75%, rgba(255,255,255,0.7) 0%, transparent 100%),
                radial-gradient(2px 2px at 5% 45%, rgba(150,210,255,0.9) 0%, transparent 100%),
                radial-gradient(1px 1px at 95% 55%, rgba(255,255,255,0.65) 0%, transparent 100%),
                radial-gradient(1px 1px at 72% 88%, rgba(255,255,255,0.6) 0%, transparent 100%),
                radial-gradient(1.5px 1.5px at 18% 50%, rgba(255,255,255,0.55) 0%, transparent 100%),
                radial-gradient(1px 1px at 33% 22%, rgba(255,255,255,0.8) 0%, transparent 100%),
                radial-gradient(1px 1px at 88% 12%, rgba(255,255,255,0.7) 0%, transparent 100%);
            animation: starTwinkle 6s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================
           🌊 GELOMBANG CAHAYA BIRU — AFTER LAYER
        ============================================ */
        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 120% 30% at 50% 100%,
                    rgba(0, 100, 255, 0.12) 0%,
                    transparent 70%),
                radial-gradient(ellipse 40% 20% at 50% 100%,
                    rgba(0, 180, 255, 0.1) 0%,
                    transparent 60%);
            animation: waveGlow 8s ease-in-out infinite alternate;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes starTwinkle {
            0%   { opacity: 0.6; transform: scale(1); }
            50%  { opacity: 1;   transform: scale(1.02); }
            100% { opacity: 0.7; transform: scale(1); }
        }

        @keyframes waveGlow {
            0%   { opacity: 0.4; transform: translateY(0px); }
            100% { opacity: 1;   transform: translateY(-15px); }
        }

        /* ============================================
           🏷️ HEADER
        ============================================ */
        .header {
            margin-bottom: 100px;
            position: relative;
            z-index: 10;
            border: 2px solid rgba(0, 180, 255, 0.6);
            box-shadow:
                0 0 20px rgba(0, 150, 255, 0.4),
                0 0 40px rgba(0, 100, 255, 0.2),
                inset 0 -2px 5px 1px rgba(0, 50, 120, 0.6),
                inset 0 -1px 1px 3px rgba(0, 30, 80, 0.8);
            padding: 10px;
            background-image: linear-gradient(to bottom,
                rgba(0, 40, 120, 0.95) 0%,
                rgba(0, 10, 40, 0.98) 100%);
            border-radius: 4px;
            backdrop-filter: blur(4px);
        }

        .logo-background {
            position: absolute;
            width: 220px;
            height: 80px;
            background: linear-gradient(135deg,
                rgba(0, 80, 200, 0.4) 0%,
                rgba(0, 160, 255, 0.2) 100%);
            z-index: -1;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 20px 0 20px 0;
            box-shadow: 0 0 15px rgba(0, 150, 255, 0.3);
        }

        /* ============================================
           🎲 CUBE 3D
        ============================================ */
        .cube {
            width: 200px;
            height: 200px;
            perspective: 1000px;
            margin-bottom: 40px;
            position: relative;
            z-index: 10;
        }

        .cube-container {
            width: 200px;
            height: 200px;
            position: relative;
            transform-style: preserve-3d;
            animation: spin 20s infinite linear;
            filter: drop-shadow(0 0 20px rgba(0, 180, 255, 0.6));
        }

        .cube-face {
            position: absolute;
            width: 200px;
            height: 200px;
            background-size: cover;
            backface-visibility: hidden;
            border: 1px solid rgba(0, 200, 255, 0.2);
        }

        .front, .back, .right, .left, .top, .bottom {
            background-image: url('https://i.postimg.cc/BbdDFBSd/senior188-konspirasi-area-51.webp');
        }

        .front  { transform: rotateY(0deg)    translateZ(100px); }
        .back   { transform: rotateY(180deg)  translateZ(100px); }
        .right  { transform: rotateY(90deg)   translateZ(100px); }
        .left   { transform: rotateY(-90deg)  translateZ(100px); }
        .top    { transform: rotateX(90deg)   translateZ(100px); }
        .bottom { transform: rotateX(-90deg)  translateZ(100px); }

        @keyframes spin {
            from { transform: rotateX(0deg)   rotateY(0deg); }
            to   { transform: rotateX(360deg) rotateY(360deg); }
        }

        /* ============================================
           🐉 NAGA
        ============================================ */
        .dragon {
            position: absolute;
            width: 220px;
            height: 220px;
            background-image: url('https://i.postimg.cc/3NrdHg3D/lightning.gif');
            background-size: contain;
            background-repeat: no-repeat;
            top: 40px;
            left: -10px;
            opacity: 0;
            transform: scale(0.3);
            filter: drop-shadow(0 0 25px rgba(0, 180, 255, 0.9))
                    drop-shadow(0 0 10px rgba(100, 220, 255, 0.6));
            animation: dragonOut 6s infinite;
        }

        @keyframes dragonOut {
            0%   { opacity: 0; transform: scale(0.2) translateZ(-100px); }
            25%  { opacity: 1; transform: scale(0.6) translateY(-20px); }
            50%  { opacity: 1; transform: scale(1.2) translateY(-80px); }
            75%  { opacity: 1; transform: scale(1.4) translateY(-120px); }
            100% { opacity: 0; transform: scale(2)   translateY(-200px); }
        }

        /* ============================================
           🔘 TOMBOL — LOGIN & DAFTAR
        ============================================ */

                inset 0 -2px 4px rgba(0, 0, 80, 0.4);

            font-size: 18px;
            font-weight: bold;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(100, 200, 255, 0.8);
        }

        .body-button:hover,
